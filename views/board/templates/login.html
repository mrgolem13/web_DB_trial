<!doctype html>
<html>
    <head>
        <link rel="stylesheet" href="/static/style.css">
    </head>
    <body>
    <div style="display: flex; align-items: center;">
        <img src="/static/logo.png" class="logo" alt="로고">
    </div>
        <h1>로그인</h1>
        <p style="color:red;">{{error}}</p>
        <form method="post">
            아이디: <input type="text" name="username" id="username"><br><br>
            비밀번호: <input type="password" name="password" id="password"><br><br>
            <input type="button" value="확인" onclick="
                if(document.getElementById('username').value==''
                || document.getElementById('password').value==''){
                    alert('모든 항목을 입력해주세요.');
                } else {
                    document.querySelector('form').submit();
                }
            ">
            <input type="button" value="취소" onclick="location.href='/'">
        </form>
        <button onclick="location.href='/register/'">회원가입</button>
    </body>
</html>
